<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Panel de Control Financiero</h1>

        <!-- Sección de Balance General -->
        <section class="balance-section card">
            <h2>Balance General</h2>
            <div class="balance-details">
                <div>
                    <h4>Ingresos Totales</h4>
                    <p id="total-income" class="money plus">S/ 0.00</p>
                </div>
                <div>
                    <h4>Gastos Totales</h4>
                    <p id="total-expense" class="money minus">S/ 0.00</p>
                </div>
                <div>
                    <h4>Saldo Final</h4>
                    <p id="balance" class="money">S/ 0.00</p>
                </div>
            </div>
        </section>

        <main class="grid-container">
            <!-- Columna de Formularios -->
            <div class="column">
                <section class="card">
                    <h2>Registrar Ingreso</h2>
                    <form id="income-form">
                        <div class="form-control">
                            <label for="income-description">Descripción</label>
                            <input type="text" id="income-description" placeholder="Ej: Salario mensual" required>
                        </div>
                        <div class="form-control">
                            <label for="income-amount">Monto (S/.)</label>
                            <input type="number" id="income-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <button class="btn plus">Agregar Ingreso</button>
                    </form>
                </section>
                <section class="card">
                    <h2>Registrar Gasto</h2>
                    <form id="expense-form">
                        <div class="form-control">
                            <label for="expense-description">Descripción</label>
                            <input type="text" id="expense-description" placeholder="Ej: Almuerzo" required>
                        </div>
                        <div class="form-control">
                            <label for="expense-category">Categoría</label>
                            <select id="expense-category" required></select>
                        </div>
                        <div class="form-control">
                            <label for="expense-amount">Monto (S/.)</label>
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <button class="btn minus">Agregar Gasto</button>
                    </form>
                </section>
            </div>

            <!-- Columna de Gráfico y Resumen -->
            <div class="column">
                <section class="card">
                    <h2>Distribución de Gastos</h2>
                    <div class="chart-container">
                        <canvas id="expense-chart"></canvas>
                    </div>
                </section>
                <section class="card">
                    <h2>Resumen por Categoría</h2>
                    <div id="summary-container"></div>
                </section>
            </div>

            <!-- Columna del Historial -->
            <div class="column">
                <section class="card">
                    <h2>Historial de Transacciones</h2>
                    <div id="history-list"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
