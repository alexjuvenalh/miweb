<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Panel de Control Financiero</h1>

        <!-- Sección de Balance General -->
        <section class="balance-section card">
            <h2>Balance General</h2>
            <div class="balance-details">
                <div>
                    <h4>Ingresos Totales</h4>
                    <p id="total-income" class="money plus">S/ 0.00</p>
                </div>
                <div>
                    <h4>Gastos Totales</h4>
                    <p id="total-expense" class="money minus">S/ 0.00</p>
                </div>
                <div>
                    <h4>Saldo Final</h4>
                    <p id="balance" class="money">S/ 0.00</p>
                </div>
            </div>
        </section>

        <main class="grid-container">
            <!-- Columna de Formularios -->
            <div class="column">
                <section class="card">
                    <h2>Registrar Ingreso</h2>
                    <form id="income-form">
                        <div class="form-control">
                            <label for="income-description">Descripción</label>
                            <input type="text" id="income-description" placeholder="Ej: Salario mensual" required>
                        </div>
                        <div class="form-control">
                            <label for="income-amount">Monto (S/.)</label>
                            <input type="number" id="income-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <button class="btn plus">Agregar Ingreso</button>
                    </form>
                </section>
                <section class="card">
                    <h2>Registrar Gasto</h2>
                    <form id="expense-form">
                        <div class="form-control">
                            <label for="expense-description">Descripción</label>
                            <input type="text" id="expense-description" placeholder="Ej: Almuerzo" required>
                        </div>
                        <div class="form-control">
                            <label for="expense-category">Categoría</label>
                            <select id="expense-category" required></select>
                        </div>
                        <div class="form-control">
                            <label for="expense-type">Tipo de Gasto</label>
                            <select id="expense-type" required>
                                <option value="variable">Gasto Variable</option>
                                <option value="fijo">Gasto Fijo</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label for="expense-amount">Monto (S/.)</label>
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <button class="btn minus">Agregar Gasto</button>
                    </form>
                </section>
            </div>

            <!-- Columna de Gráfico y Resumen -->
            <div class="column">
                <section class="card">
                    <h2>Distribución por Categoría</h2>
                    <div class="chart-container">
                        <canvas id="expense-chart"></canvas>
                    </div>
                </section>
                <section class="card">
                    <h2>Distribución Fijo vs Variable</h2>
                    <div class="chart-container">
                        <canvas id="type-chart"></canvas>
                    </div>
                </section>
                <section class="card">
                    <h2>Resumen</h2>
                    <div id="summary-container"></div>
                </section>
            </div>

            <!-- Columna del Historial -->
            <div class="column">
                <section class="card">
                    <div class="flex-between">
                        <h2>Historial</h2>
                        <div class="filters">
                            <select id="filter-month">
                                <option value="">Mes (Todos)</option>
                                <option value="1">Enero</option>
                                <option value="2">Febrero</option>
                                <option value="3">Marzo</option>
                                <option value="4">Abril</option>
                                <option value="5">Mayo</option>
                                <option value="6">Junio</option>
                                <option value="7">Julio</option>
                                <option value="8">Agosto</option>
                                <option value="9">Septiembre</option>
                                <option value="10">Octubre</option>
                                <option value="11">Noviembre</option>
                                <option value="12">Diciembre</option>
                            </select>
                            <select id="filter-year">
                                <option value="">Año (Todos)</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                            </select>
                        </div>
                    </div>
                    <div id="history-list"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>

    <!-- Modal de Edición -->
    <div id="edit-modal" class="modal">
        <div class="modal-content card">
            <h2>Editar Transacción</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-type">
                
                <div class="form-control">
                    <label for="edit-description">Descripción</label>
                    <input type="text" id="edit-description" required>
                </div>

                <div id="edit-expense-fields">
                    <div class="form-control">
                        <label for="edit-category">Categoría</label>
                        <select id="edit-category"></select>
                    </div>
                    <div class="form-control">
                        <label for="edit-expense-type">Tipo de Gasto</label>
                        <select id="edit-expense-type">
                            <option value="variable">Gasto Variable</option>
                            <option value="fijo">Gasto Fijo</option>
                        </select>
                    </div>
                </div>

                <div class="form-control">
                    <label for="edit-amount">Monto (S/.)</label>
                    <input type="number" id="edit-amount" step="0.01" min="0" required>
                </div>

                <div class="modal-buttons">
                    <button type="button" id="cancel-edit" class="btn">Cancelar</button>
                    <button type="submit" class="btn plus">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
